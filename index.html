<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="color-scheme" content="light dark">
<title>字卡 HSK Flashcards</title>
<style>
  :root{
    color-scheme:light dark;
    --paper:#F5F3EC; --ink:#211F1C; --faint:#8A8578; --line:#DDD8CC;
    --seal:#BE3A2B; --seal-dark:#9E2F23; --card:#FFFFFF;
    --green:#3E6B3A; --gold:#B8860B; --orange:#D4740B;
    --ui:'Avenir Next','Helvetica Neue',system-ui,sans-serif;
    --han:'Kaiti SC','STKaiti','KaiTi','Noto Serif SC',serif;
  }
  [data-theme="dark"], @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --paper:#201E1B; --ink:#EDE9E0; --faint:#9A9385; --line:#3B382F;
      --seal:#C64B3B; --seal-dark:#E08573; --card:#2B2823;
      --green:#5A9B52; --gold:#DAA520; --orange:#E8922B;
    }
  }
  [data-theme="dark"]{
    --paper:#201E1B; --ink:#EDE9E0; --faint:#9A9385; --line:#3B382F;
    --seal:#C64B3B; --seal-dark:#E08573; --card:#2B2823;
    --green:#5A9B52; --gold:#DAA520; --orange:#E8922B;
  }
  html{background:var(--paper)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--ui);
       min-height:100vh;display:flex;flex-direction:column}
  #app{max-width:520px;width:100%;margin:0 auto;flex:1;display:flex;flex-direction:column;min-height:100vh}
  header{padding:calc(env(safe-area-inset-top) + 18px) 20px 12px;display:flex;align-items:center;
         justify-content:space-between;border-bottom:1px solid var(--line)}
  .header-left{display:flex;align-items:center;gap:12px}
  .logo-han{font-family:var(--han);font-size:26px;line-height:1}
  .logo-sub{font-size:11px;letter-spacing:.18em;color:var(--faint);margin-top:4px}
  .theme-toggle{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);
                font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .seal{width:46px;height:46px;background:var(--seal);border-radius:6px;display:flex;align-items:center;
        justify-content:center;color:#fff;font-family:var(--han);font-size:17px;box-shadow:2px 2px 0 var(--line)}
  main{flex:1;display:flex;flex-direction:column;padding:20px;overflow-y:auto}
  nav{display:flex;border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);background:var(--paper)}
  nav button{flex:1;padding:15px 0;background:none;border:none;border-top:3px solid transparent;
             color:var(--faint);font-family:var(--ui);font-size:12px;letter-spacing:.1em;cursor:pointer}
  nav button.on{border-top-color:var(--seal);color:var(--ink)}
  .hint{font-size:14px;color:var(--faint);margin-bottom:12px}
  .btn{display:block;width:100%;padding:16px 24px;border-radius:10px;border:none;background:var(--seal);
       color:#fff;font-family:var(--ui);font-size:16px;font-weight:600;cursor:pointer;margin-top:12px}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink)}
  .btn.orange{background:var(--orange)}
  .center{margin:auto 0;text-align:center;display:flex;flex-direction:column;gap:18px}
  .huge{font-family:var(--han);font-size:72px}
  .pill-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .pill{padding:8px 14px;border-radius:999px;border:1.5px solid var(--line);background:transparent;
        color:var(--ink);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ui)}
  .pill.on{border-color:var(--seal);background:var(--seal);color:#fff}
  .hidden{display:none !important}

  /* Level Selection */
  .tier-title{font-size:13px;letter-spacing:.15em;color:var(--faint);margin:20px 0 10px;text-transform:uppercase}
  .tier-title:first-child{margin-top:0}
  .level-card{display:flex;align-items:center;gap:14px;padding:16px;background:var(--card);
              border:1.5px solid var(--line);border-radius:12px;margin-bottom:10px;cursor:pointer}
  .level-card.locked{opacity:.5;cursor:not-allowed}
  .level-card.locked .level-icon{background:var(--faint)}
  .level-card.completed .level-icon{background:var(--green)}
  .level-icon{width:44px;height:44px;border-radius:10px;background:var(--seal);display:flex;
              align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
  .level-info{flex:1}
  .level-name{font-weight:600;font-size:17px}
  .level-meta{font-size:13px;color:var(--faint);margin-top:2px}
  .level-progress{width:100%;height:6px;background:var(--line);border-radius:3px;margin-top:8px;overflow:hidden}
  .level-progress-bar{height:100%;background:var(--seal);border-radius:3px;transition:width .3s}
  .level-card.completed .level-progress-bar{background:var(--green)}
  .lock-icon{font-size:20px;color:var(--faint)}

  /* Study */
  .prog{font-size:13px;color:var(--faint);letter-spacing:.1em;margin-bottom:14px}
  .flash{flex:1;min-height:320px;background:var(--card);border:1.5px solid var(--line);border-radius:16px;
         box-shadow:0 2px 0 rgba(0,0,0,.04);display:flex;flex-direction:column;align-items:center;
         justify-content:center;gap:12px;cursor:pointer;padding:24px;text-align:center;position:relative}
  .flash .tag{position:absolute;top:14px;right:16px;font-size:11px;letter-spacing:.15em;color:var(--faint)}
  .flash .level-tag{position:absolute;top:14px;left:16px;font-size:11px;letter-spacing:.1em;color:var(--seal);font-weight:600}
  .spk{position:absolute;bottom:14px;right:14px;width:46px;height:46px;border-radius:999px;
       border:1.5px solid var(--line);background:var(--paper);font-size:20px;cursor:pointer;
       display:flex;align-items:center;justify-content:center}
  .flash .big-han{font-family:var(--han);font-size:84px;line-height:1.1}
  .flash .big-pin{font-size:38px;font-weight:500}
  .flash .big-eng{font-size:28px;font-weight:500;line-height:1.35}
  .flash .mid-pin{font-size:36px;color:var(--ink);font-weight:600}
  .flash .mid-han{font-family:var(--han);font-size:46px;line-height:1.15;color:var(--seal-dark)}
  .flash .mid-eng{font-size:19px;color:var(--faint)}
  .answers{display:flex;gap:12px;margin-top:16px}
  .answers button{flex:1;padding:18px 0;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;font-family:var(--ui)}
  .again{border:1.5px solid var(--line);background:transparent;color:var(--ink)}
  .gotit{border:none;background:var(--seal);color:#fff}

  /* Typing mode */
  .typing-input{width:100%;padding:16px;border:2px solid var(--line);border-radius:12px;font-size:20px;
                text-align:center;background:var(--card);color:var(--ink);font-family:var(--ui);outline:none}
  .typing-input:focus{border-color:var(--seal)}
  .typing-input.correct{border-color:var(--green);background:rgba(62,107,58,0.1)}
  .typing-input.wrong{border-color:var(--seal);background:rgba(190,58,43,0.1)}
  .typing-hint{font-size:14px;color:var(--faint);margin-top:8px}

  /* Stats */
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
  .stat-card{background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:16px;text-align:center}
  .stat-num{font-size:32px;font-weight:700;color:var(--seal)}
  .stat-label{font-size:12px;color:var(--faint);margin-top:4px;text-transform:uppercase;letter-spacing:.1em}

  /* Add Form */
  .form-group{margin-bottom:16px}
  .form-label{font-size:13px;color:var(--faint);margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em}
  .form-input{width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:10px;background:var(--card);
              color:var(--ink);font-family:var(--ui);font-size:16px;outline:none}
  .form-input:focus{border-color:var(--seal)}
  .form-input.hanzi{font-family:var(--han);font-size:24px;text-align:center}
  .custom-card{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);
               border:1.5px solid var(--line);border-radius:10px;margin-bottom:8px}
  .custom-card .han{font-family:var(--han);font-size:24px;color:var(--seal-dark)}
  .custom-card .details{flex:1}
  .custom-card .pin{font-size:14px;color:var(--ink)}
  .custom-card .eng{font-size:13px;color:var(--faint)}
  .custom-card .del{width:32px;height:32px;border:none;background:transparent;color:var(--faint);
                    font-size:18px;cursor:pointer;border-radius:6px}
  .custom-card .del:hover{background:var(--line);color:var(--seal)}

  /* Difficult word badge */
  .difficult-badge{display:inline-block;background:var(--orange);color:#fff;font-size:10px;padding:2px 6px;
                   border-radius:4px;margin-left:8px;font-weight:600}

  @media (prefers-reduced-motion: no-preference){
    .flash{transition:transform .08s ease}
    .flash:active{transform:scale(.985)}
    .level-card{transition:transform .1s ease}
    .level-card:active:not(.locked){transform:scale(.98)}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">☀️</button>
      <div>
        <div class="logo-han">字卡</div>
        <div class="logo-sub">HSK · FLASHCARDS</div>
      </div>
    </div>
    <div class="seal" id="totalProgress">0%</div>
  </header>

  <main id="main"></main>

  <nav>
    <button id="tab-levels" class="on">LEVELS</button>
    <button id="tab-study">STUDY</button>
    <button id="tab-add">ADD</button>
    <button id="tab-stats">STATS</button>
  </nav>
</div>

<script src="hsk.js"></script>
<script>
// ---------- Helpers ----------
const $=id=>document.getElementById(id);
const esc=s=>(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// Normalize pinyin for comparison (remove tone marks, lowercase)
function normalizePinyin(s) {
  return (s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/ā|á|ǎ|à/g, 'a').replace(/ē|é|ě|è/g, 'e')
    .replace(/ī|í|ǐ|ì/g, 'i').replace(/ō|ó|ǒ|ò/g, 'o')
    .replace(/ū|ú|ǔ|ù/g, 'u').replace(/ǖ|ǘ|ǚ|ǜ|ü/g, 'v')
    .replace(/\s+/g, '').trim();
}

// ---------- Storage ----------
const PROGRESS_KEY = 'hsk-progress-v2';
const CUSTOM_KEY = 'hsk-custom-v1';
const SRS_KEY = 'hsk-srs-v1';
const THEME_KEY = 'hsk-theme';
let progress = {};  // { level: { mastered: Set, seen: Set } }
let srsData = {};   // { "level:hanzi": { interval: days, nextReview: timestamp, againCount: number } }
let customCards = [];
let storageOk = true;

function loadProgress() {
  try {
    const raw = localStorage.getItem(PROGRESS_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      for (const lvl in data) {
        progress[lvl] = {
          mastered: new Set(data[lvl].mastered || []),
          seen: new Set(data[lvl].seen || [])
        };
      }
    }
  } catch(e) { storageOk = false; }
}

function saveProgress() {
  try {
    const data = {};
    for (const lvl in progress) {
      data[lvl] = {
        mastered: Array.from(progress[lvl].mastered),
        seen: Array.from(progress[lvl].seen)
      };
    }
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(data));
  } catch(e) { storageOk = false; }
}

function loadSRS() {
  try {
    const raw = localStorage.getItem(SRS_KEY);
    if (raw) srsData = JSON.parse(raw);
  } catch(e) { storageOk = false; }
}

function saveSRS() {
  try {
    localStorage.setItem(SRS_KEY, JSON.stringify(srsData));
  } catch(e) { storageOk = false; }
}

function getSRS(level, hanzi) {
  const key = `${level}:${hanzi}`;
  if (!srsData[key]) srsData[key] = { interval: 0, nextReview: 0, againCount: 0 };
  return srsData[key];
}

function updateSRS(level, hanzi, gotIt) {
  const srs = getSRS(level, hanzi);
  const now = Date.now();
  if (gotIt) {
    // Increase interval: 0->1->3->7->14->30
    const intervals = [1, 3, 7, 14, 30];
    const idx = intervals.indexOf(srs.interval);
    srs.interval = intervals[Math.min(idx + 1, intervals.length - 1)] || 1;
  } else {
    srs.interval = 1;
    srs.againCount = (srs.againCount || 0) + 1;
  }
  srs.nextReview = now + srs.interval * 24 * 60 * 60 * 1000;
  saveSRS();
}

function isDueForReview(level, hanzi) {
  const srs = getSRS(level, hanzi);
  return srs.interval > 0 && Date.now() >= srs.nextReview;
}

function isDifficult(level, hanzi) {
  const srs = getSRS(level, hanzi);
  return (srs.againCount || 0) >= 3;
}

function getDifficultWords() {
  const difficult = [];
  for (const key in srsData) {
    if ((srsData[key].againCount || 0) >= 3) {
      const [lvl, h] = key.split(':');
      const words = HSK[lvl] || [];
      const word = words.find(w => w.h === h);
      if (word) difficult.push({ ...word, level: lvl });
    }
  }
  return difficult;
}

function getDueWords(level) {
  const words = HSK[level] || [];
  const p = getProgress(level);
  return words.filter(w => p.seen.has(w.h) && isDueForReview(level, w.h));
}

function loadCustomCards() {
  try {
    const raw = localStorage.getItem(CUSTOM_KEY);
    if (raw) customCards = JSON.parse(raw);
  } catch(e) { storageOk = false; }
}

function saveCustomCards() {
  try {
    localStorage.setItem(CUSTOM_KEY, JSON.stringify(customCards));
  } catch(e) { storageOk = false; }
}

function getProgress(level) {
  if (!progress[level]) progress[level] = { mastered: new Set(), seen: new Set() };
  return progress[level];
}

function getMasteryPercent(level) {
  const p = getProgress(level);
  const total = HSK[level] ? HSK[level].length : 0;
  if (total === 0) return 0;
  return Math.round((p.mastered.size / total) * 100);
}

function getTierMastery(tier) {
  const levels = HSK_LEVELS[tier] || [];
  let totalWords = 0, masteredWords = 0;
  for (const lvl of levels) {
    if (HSK[lvl]) {
      totalWords += HSK[lvl].length;
      masteredWords += getProgress(lvl).mastered.size;
    }
  }
  return totalWords > 0 ? Math.round((masteredWords / totalWords) * 100) : 0;
}

function isTierUnlocked(tier) {
  if (tier === 'elementary') return true;
  if (tier === 'intermediate') return getTierMastery('elementary') >= 80;
  if (tier === 'advanced') return getTierMastery('intermediate') >= 80;
  return false;
}

// ---------- Theme ----------
function loadTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
    updateThemeIcon(saved);
  } else {
    updateThemeIcon(null);
  }
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  let next;
  if (!current) {
    next = prefersDark ? 'light' : 'dark';
  } else if (current === 'dark') {
    next = 'light';
  } else {
    next = 'dark';
  }
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(THEME_KEY, next);
  updateThemeIcon(next);
}

function updateThemeIcon(theme) {
  const btn = $('themeToggle');
  if (!btn) return;
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = theme === 'dark' || (!theme && prefersDark);
  btn.textContent = isDark ? '☀️' : '🌙';
}

// ---------- Voice ----------
let keepAlive = null;
function speak(t) {
  if (!('speechSynthesis' in window) || !t) return;
  try {
    speechSynthesis.cancel();
    speechSynthesis.resume();
    const u = new SpeechSynthesisUtterance(t);
    keepAlive = u;
    u.lang = 'zh-CN';
    u.rate = 0.85;
    u.volume = 1;
    const voices = speechSynthesis.getVoices();
    const zh = voices.find(v => v.lang.startsWith('zh'));
    if (zh) u.voice = zh;
    try { speechSynthesis.speak(u); speechSynthesis.resume(); } catch(e) {}
  } catch(e) {}
}

// ---------- State ----------
let view = 'levels';
let currentLevel = null;
let queue = [];
let flipped = false;
let front = 'pinyin';
let studyMode = 'flashcard'; // 'flashcard' or 'typing'
let typingAnswer = '';
let typingChecked = false;
let sessionStats = { correct: 0, again: 0 };

// ---------- Shuffle ----------
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---------- Render ----------
function render() {
  const m = $('main');

  // Update nav
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('on'));
  if (view === 'levels') $('tab-levels').classList.add('on');
  else if (view.startsWith('study') || view === 'levelDetail') $('tab-study').classList.add('on');
  else if (view === 'add') $('tab-add').classList.add('on');
  else if (view === 'stats' || view === 'difficult') $('tab-stats').classList.add('on');

  // Update header progress
  let totalWords = 0, masteredWords = 0;
  for (const lvl in HSK) {
    totalWords += HSK[lvl].length;
    masteredWords += getProgress(lvl).mastered.size;
  }
  $('totalProgress').textContent = totalWords > 0 ? Math.round((masteredWords / totalWords) * 100) + '%' : '0%';

  if (view === 'levels') renderLevels(m);
  else if (view === 'levelDetail') renderLevelDetail(m);
  else if (view === 'study') renderStudy(m);
  else if (view === 'add') renderAdd(m);
  else if (view === 'stats') renderStats(m);
  else if (view === 'difficult') renderDifficult(m);
}

function renderLevels(m) {
  let html = '';

  const tiers = [
    { id: 'elementary', name: 'Elementary', levels: [1, 2, 3] },
    { id: 'intermediate', name: 'Intermediate', levels: [4, 5, 6] },
    { id: 'advanced', name: 'Advanced', levels: [7, 8, 9] }
  ];

  for (const tier of tiers) {
    const unlocked = isTierUnlocked(tier.id);
    const mastery = getTierMastery(tier.id);

    const prevTier = tier.id === 'intermediate' ? 'Elementary' : 'Intermediate';
    const tierLabel = unlocked ? `· ${mastery}%` : `· 🔒 Complete ${prevTier} (80%)`;
    html += `<div class="tier-title">${tier.name} ${tierLabel}</div>`;

    for (const lvl of tier.levels) {
      if (!HSK[lvl]) continue;
      const words = HSK[lvl].length;
      const pct = getMasteryPercent(lvl);
      const completed = pct >= 100;
      const locked = !unlocked;
      const dueCount = getDueWords(lvl).length;

      html += `
        <div class="level-card ${locked ? 'locked' : ''} ${completed ? 'completed' : ''}" data-level="${lvl}">
          <div class="level-icon">${lvl}</div>
          <div class="level-info">
            <div class="level-name">HSK Level ${lvl}${dueCount > 0 ? `<span class="difficult-badge" style="background:var(--gold)">${dueCount} due</span>` : ''}</div>
            <div class="level-meta">${words} words · ${pct}% mastered</div>
            <div class="level-progress"><div class="level-progress-bar" style="width:${pct}%"></div></div>
          </div>
          ${locked ? '<span class="lock-icon">🔒</span>' : ''}
        </div>`;
    }
  }

  m.innerHTML = html;

  m.querySelectorAll('.level-card:not(.locked)').forEach(card => {
    card.onclick = () => {
      currentLevel = parseInt(card.dataset.level);
      view = 'levelDetail';
      render();
    };
  });
}

function renderLevelDetail(m) {
  const lvl = currentLevel;
  const words = HSK[lvl] || [];
  const p = getProgress(lvl);
  const pct = getMasteryPercent(lvl);
  const newWords = words.filter(w => !p.seen.has(w.h));
  const reviewWords = words.filter(w => p.seen.has(w.h) && !p.mastered.has(w.h));
  const dueWords = getDueWords(lvl);

  m.innerHTML = `
    <div class="center">
      <div class="huge" style="color:var(--seal)">${lvl}</div>
      <div style="font-size:20px;font-weight:600">HSK Level ${lvl}</div>
      <div class="hint" style="margin:0">${words.length} words · ${pct}% mastered</div>

      <div class="stats-grid" style="margin-top:20px">
        <div class="stat-card">
          <div class="stat-num">${newWords.length}</div>
          <div class="stat-label">New</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${reviewWords.length}</div>
          <div class="stat-label">Review</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${dueWords.length}</div>
          <div class="stat-label">Due (SRS)</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${p.mastered.size}</div>
          <div class="stat-label">Mastered</div>
        </div>
      </div>

      <div class="tier-title" style="text-align:center">Study Mode</div>
      <div class="pill-row">
        <button class="pill ${studyMode==='flashcard'?'on':''}" id="mFlash">Flashcard</button>
        <button class="pill ${studyMode==='typing'?'on':''}" id="mType">Type Pinyin</button>
      </div>

      <div class="tier-title" style="text-align:center">Card Front</div>
      <div class="pill-row">
        <button class="pill ${front==='pinyin'?'on':''}" id="fPin">Pinyin</button>
        <button class="pill ${front==='hanzi'?'on':''}" id="fHan">汉字</button>
        <button class="pill ${front==='english'?'on':''}" id="fEng">English</button>
      </div>

      ${dueWords.length > 0 ? `<button class="btn orange" id="studyDue">Review Due Words (${dueWords.length})</button>` : ''}
      <button class="btn" id="studyNew" ${newWords.length === 0 ? 'disabled' : ''}>Learn New (${newWords.length})</button>
      <button class="btn ghost" id="studyReview" ${reviewWords.length === 0 ? 'disabled' : ''}>Review (${reviewWords.length})</button>
      <button class="btn ghost" id="studyAll">Study All (${words.length})</button>
      <button class="btn ghost" id="backToLevels">← Back to Levels</button>
    </div>`;

  $('mFlash').onclick = () => { studyMode = 'flashcard'; render(); };
  $('mType').onclick = () => { studyMode = 'typing'; render(); };
  $('fHan').onclick = () => { front = 'hanzi'; render(); };
  $('fPin').onclick = () => { front = 'pinyin'; render(); };
  $('fEng').onclick = () => { front = 'english'; render(); };

  const studyDueBtn = $('studyDue');
  if (studyDueBtn) {
    studyDueBtn.onclick = () => {
      queue = shuffle(dueWords);
      sessionStats = { correct: 0, again: 0 };
      flipped = false;
      typingAnswer = '';
      typingChecked = false;
      view = 'study';
      render();
    };
  }

  $('studyNew').onclick = () => {
    queue = shuffle(newWords.slice(0, 20));
    sessionStats = { correct: 0, again: 0 };
    flipped = false;
    typingAnswer = '';
    typingChecked = false;
    view = 'study';
    render();
  };

  $('studyReview').onclick = () => {
    queue = shuffle(reviewWords);
    sessionStats = { correct: 0, again: 0 };
    flipped = false;
    typingAnswer = '';
    typingChecked = false;
    view = 'study';
    render();
  };

  $('studyAll').onclick = () => {
    queue = shuffle(words);
    sessionStats = { correct: 0, again: 0 };
    flipped = false;
    typingAnswer = '';
    typingChecked = false;
    view = 'study';
    render();
  };

  $('backToLevels').onclick = () => {
    view = 'levels';
    render();
  };
}

function renderStudy(m) {
  const cur = queue[0];
  const lvl = currentLevel;
  const isCustom = lvl === 'custom';
  const total = queue.length + sessionStats.correct + sessionStats.again;

  if (!cur) {
    // Session complete
    if (isCustom) {
      m.innerHTML = `
        <div class="center">
          <div class="huge" style="color:var(--green)">好</div>
          <div style="font-size:18px">Session Complete!</div>
          <div class="stats-grid" style="margin-top:20px">
            <div class="stat-card">
              <div class="stat-num" style="color:var(--green)">${sessionStats.correct}</div>
              <div class="stat-label">Got it</div>
            </div>
            <div class="stat-card">
              <div class="stat-num" style="color:var(--seal)">${sessionStats.again}</div>
              <div class="stat-label">Again</div>
            </div>
          </div>
          <button class="btn" id="backToAdd">Back to Custom Cards</button>
        </div>`;

      $('backToAdd').onclick = () => { view = 'add'; render(); };
      return;
    }

    const pct = getMasteryPercent(lvl);

    m.innerHTML = `
      <div class="center">
        <div class="huge" style="color:var(--green)">好</div>
        <div style="font-size:18px">Session Complete!</div>
        <div class="stats-grid" style="margin-top:20px">
          <div class="stat-card">
            <div class="stat-num" style="color:var(--green)">${sessionStats.correct}</div>
            <div class="stat-label">Got it</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" style="color:var(--seal)">${sessionStats.again}</div>
            <div class="stat-label">Again</div>
          </div>
        </div>
        <div class="hint">Level ${lvl}: ${pct}% mastered</div>
        <button class="btn" id="continueStudy">Continue Studying</button>
        <button class="btn ghost" id="backToLevel">Back to Level ${lvl}</button>
      </div>`;

    $('continueStudy').onclick = () => {
      view = 'levelDetail';
      render();
    };
    $('backToLevel').onclick = () => {
      view = 'levelDetail';
      render();
    };
    return;
  }

  // Typing mode
  if (studyMode === 'typing' && !isCustom) {
    renderTypingMode(m, cur, lvl);
    return;
  }

  // Flashcard mode
  const done = sessionStats.correct + sessionStats.again;
  const face = !flipped
    ? (front === 'hanzi' ? `<div class="big-han">${esc(cur.h)}</div>`
       : front === 'pinyin' ? `<div class="big-pin">${esc(cur.p)}</div>`
       : `<div class="big-eng">${esc(cur.e)}</div>`)
    : `<div class="mid-pin">${esc(cur.p)}</div>
       <div class="mid-han">${esc(cur.h)}</div>
       <div class="mid-eng">${esc(cur.e)}</div>`;

  const levelLabel = isCustom ? 'CUSTOM' : `HSK ${lvl}`;
  const difficultTag = !isCustom && isDifficult(lvl, cur.h) ? '<span class="difficult-badge">HARD</span>' : '';

  m.innerHTML = `
    <div class="prog">${done} / ${total} · ${queue.length} left</div>
    <div class="flash" id="flash">
      <div class="level-tag">${levelLabel} ${difficultTag}</div>
      <div class="tag">${flipped ? 'ANSWER' : 'TAP TO FLIP'}</div>
      ${face}
      ${(flipped || front === 'hanzi') ? '<button class="spk" id="spkBtn" aria-label="Play pronunciation">🔊</button>' : ''}
    </div>
    <div class="answers">
      <button class="again" id="aAgain">Again</button>
      <button class="gotit" id="aGot">Got it</button>
    </div>`;

  $('flash').onclick = () => { flipped = !flipped; render(); };

  const sb = $('spkBtn');
  if (sb) sb.onclick = (e) => { e.stopPropagation(); speak(cur.h); };

  $('aAgain').onclick = () => {
    if (!isCustom) {
      const p = getProgress(lvl);
      p.seen.add(cur.h);
      updateSRS(lvl, cur.h, false);
      saveProgress();
    }

    const [c, ...rest] = queue;
    queue = [...rest, c];
    sessionStats.again++;
    flipped = false;
    render();
  };

  $('aGot').onclick = () => {
    if (!isCustom) {
      const p = getProgress(lvl);
      p.seen.add(cur.h);
      p.mastered.add(cur.h);
      updateSRS(lvl, cur.h, true);
      saveProgress();
    }

    queue = queue.slice(1);
    sessionStats.correct++;
    flipped = false;
    render();
  };
}

function renderTypingMode(m, cur, lvl) {
  const done = sessionStats.correct + sessionStats.again;
  const total = queue.length + sessionStats.correct + sessionStats.again;
  const difficultTag = isDifficult(lvl, cur.h) ? '<span class="difficult-badge">HARD</span>' : '';

  const isCorrect = typingChecked && normalizePinyin(typingAnswer) === normalizePinyin(cur.p);
  const inputClass = typingChecked ? (isCorrect ? 'correct' : 'wrong') : '';

  m.innerHTML = `
    <div class="prog">${done} / ${total} · ${queue.length} left</div>
    <div class="flash">
      <div class="level-tag">HSK ${lvl} ${difficultTag}</div>
      <div class="tag">TYPE PINYIN</div>
      <div class="big-han">${esc(cur.h)}</div>
      ${typingChecked ? `<div class="mid-eng">${esc(cur.e)}</div>` : ''}
      <button class="spk" id="spkBtn" aria-label="Play pronunciation">🔊</button>
    </div>
    <input type="text" class="typing-input ${inputClass}" id="typingInput"
           value="${esc(typingAnswer)}" placeholder="Type pinyin..."
           ${typingChecked ? 'disabled' : ''} autocomplete="off" autocapitalize="none">
    ${typingChecked ? `<div class="typing-hint">Correct: <strong>${esc(cur.p)}</strong></div>` : ''}
    <div class="answers">
      ${typingChecked
        ? `<button class="again" id="aAgain">Again</button>
           <button class="gotit" id="aGot">${isCorrect ? 'Continue' : 'Got it anyway'}</button>`
        : `<button class="btn" id="checkAnswer">Check Answer</button>`}
    </div>`;

  const input = $('typingInput');
  if (!typingChecked && input) {
    input.focus();
    input.oninput = (e) => { typingAnswer = e.target.value; };
    input.onkeydown = (e) => {
      if (e.key === 'Enter') {
        typingChecked = true;
        render();
      }
    };
  }

  $('spkBtn').onclick = (e) => { e.stopPropagation(); speak(cur.h); };

  const checkBtn = $('checkAnswer');
  if (checkBtn) {
    checkBtn.onclick = () => {
      typingChecked = true;
      render();
    };
  }

  const againBtn = $('aAgain');
  if (againBtn) {
    againBtn.onclick = () => {
      const p = getProgress(lvl);
      p.seen.add(cur.h);
      updateSRS(lvl, cur.h, false);
      saveProgress();

      const [c, ...rest] = queue;
      queue = [...rest, c];
      sessionStats.again++;
      typingAnswer = '';
      typingChecked = false;
      render();
    };
  }

  const gotBtn = $('aGot');
  if (gotBtn) {
    gotBtn.onclick = () => {
      const p = getProgress(lvl);
      p.seen.add(cur.h);
      p.mastered.add(cur.h);
      updateSRS(lvl, cur.h, true);
      saveProgress();

      queue = queue.slice(1);
      sessionStats.correct++;
      typingAnswer = '';
      typingChecked = false;
      render();
    };
  }
}

function renderStats(m) {
  let totalWords = 0, masteredWords = 0, seenWords = 0;

  for (const lvl in HSK) {
    totalWords += HSK[lvl].length;
    const p = getProgress(lvl);
    masteredWords += p.mastered.size;
    seenWords += p.seen.size;
  }

  const elemMastery = getTierMastery('elementary');
  const intMastery = getTierMastery('intermediate');
  const difficultWords = getDifficultWords();

  m.innerHTML = `
    <div style="padding:10px 0">
      <div class="tier-title" style="margin-top:0">Overall Progress</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num">${masteredWords}</div>
          <div class="stat-label">Mastered</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${seenWords}</div>
          <div class="stat-label">Seen</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${totalWords}</div>
          <div class="stat-label">Total Words</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${totalWords > 0 ? Math.round((masteredWords/totalWords)*100) : 0}%</div>
          <div class="stat-label">Complete</div>
        </div>
      </div>

      <div class="tier-title">Tier Progress</div>
      <div class="level-card">
        <div class="level-icon" style="background:${elemMastery >= 80 ? 'var(--green)' : 'var(--seal)'}">初</div>
        <div class="level-info">
          <div class="level-name">Elementary (HSK 1-3)</div>
          <div class="level-meta">${elemMastery}% mastered${elemMastery >= 80 ? ' ✓' : ''}</div>
          <div class="level-progress"><div class="level-progress-bar" style="width:${elemMastery}%;background:${elemMastery >= 80 ? 'var(--green)' : 'var(--seal)'}"></div></div>
        </div>
      </div>
      <div class="level-card ${elemMastery < 80 ? 'locked' : ''}">
        <div class="level-icon" style="background:${intMastery >= 80 ? 'var(--green)' : elemMastery >= 80 ? 'var(--seal)' : 'var(--faint)'}">中</div>
        <div class="level-info">
          <div class="level-name">Intermediate (HSK 4-6)</div>
          <div class="level-meta">${elemMastery >= 80 ? `${intMastery}% mastered` : 'Complete Elementary to unlock'}</div>
          <div class="level-progress"><div class="level-progress-bar" style="width:${intMastery}%;background:${intMastery >= 80 ? 'var(--green)' : 'var(--seal)'}"></div></div>
        </div>
        ${elemMastery < 80 ? '<span class="lock-icon">🔒</span>' : ''}
      </div>

      ${difficultWords.length > 0 ? `
        <div class="tier-title">Difficult Words</div>
        <div class="level-card" id="viewDifficult" style="cursor:pointer">
          <div class="level-icon" style="background:var(--orange)">!</div>
          <div class="level-info">
            <div class="level-name">Words You Struggle With</div>
            <div class="level-meta">${difficultWords.length} difficult words</div>
          </div>
        </div>
      ` : ''}

      <div class="tier-title">Reset Data</div>
      <button class="btn ghost" id="resetProgress">Reset All Progress</button>
    </div>`;

  const viewDiff = $('viewDifficult');
  if (viewDiff) {
    viewDiff.onclick = () => { view = 'difficult'; render(); };
  }

  $('resetProgress').onclick = () => {
    if (confirm('Are you sure you want to reset all progress? This cannot be undone.')) {
      progress = {};
      srsData = {};
      saveProgress();
      saveSRS();
      render();
    }
  };
}

function renderDifficult(m) {
  const difficult = getDifficultWords();

  let cardsHtml = '';
  for (const w of difficult) {
    const srs = getSRS(w.level, w.h);
    cardsHtml += `
      <div class="custom-card">
        <div class="han">${esc(w.h)}</div>
        <div class="details">
          <div class="pin">${esc(w.p)} <span style="color:var(--faint);font-size:12px">HSK ${w.level}</span></div>
          <div class="eng">${esc(w.e)}</div>
          <div style="font-size:11px;color:var(--orange);margin-top:4px">Missed ${srs.againCount}× times</div>
        </div>
      </div>`;
  }

  m.innerHTML = `
    <div style="padding:10px 0">
      <div class="tier-title" style="margin-top:0">Difficult Words (${difficult.length})</div>
      <div class="hint">Words you've pressed "Again" on 3+ times</div>
      ${cardsHtml}
      ${difficult.length > 0 ? '<button class="btn" id="studyDifficult">Study Difficult Words</button>' : ''}
      <button class="btn ghost" id="backToStats">← Back to Stats</button>
    </div>`;

  const studyBtn = $('studyDifficult');
  if (studyBtn) {
    studyBtn.onclick = () => {
      // Study difficult words across all levels
      currentLevel = difficult[0]?.level || 1;
      queue = shuffle(difficult.map(d => ({ h: d.h, p: d.p, e: d.e, _level: d.level })));
      sessionStats = { correct: 0, again: 0 };
      flipped = false;
      typingAnswer = '';
      typingChecked = false;
      view = 'study';
      render();
    };
  }

  $('backToStats').onclick = () => { view = 'stats'; render(); };
}

function renderAdd(m) {
  let cardsHtml = '';
  if (customCards.length === 0) {
    cardsHtml = '<div class="hint" style="text-align:center;margin:20px 0">No custom cards yet</div>';
  } else {
    cardsHtml = '<div class="tier-title">Your Cards (' + customCards.length + ')</div>';
    for (let i = 0; i < customCards.length; i++) {
      const c = customCards[i];
      cardsHtml += `
        <div class="custom-card">
          <div class="han">${esc(c.h)}</div>
          <div class="details">
            <div class="pin">${esc(c.p)}</div>
            <div class="eng">${esc(c.e)}</div>
          </div>
          <button class="del" data-idx="${i}" title="Delete">×</button>
        </div>`;
    }
  }

  m.innerHTML = `
    <div style="padding:10px 0">
      <div class="tier-title" style="margin-top:0">Add Custom Card</div>
      <div class="form-group">
        <div class="form-label">Hanzi (汉字)</div>
        <input type="text" id="addHanzi" class="form-input hanzi" placeholder="你好">
      </div>
      <div class="form-group">
        <div class="form-label">Pinyin</div>
        <input type="text" id="addPinyin" class="form-input" placeholder="nǐ hǎo">
      </div>
      <div class="form-group">
        <div class="form-label">English</div>
        <input type="text" id="addEnglish" class="form-input" placeholder="hello">
      </div>
      <button class="btn" id="addCardBtn">Add Card</button>

      ${cardsHtml}

      ${customCards.length > 0 ? '<button class="btn ghost" id="studyCustom" style="margin-top:12px">Study Custom Cards</button>' : ''}
    </div>`;

  $('addCardBtn').onclick = () => {
    const h = $('addHanzi').value.trim();
    const p = $('addPinyin').value.trim();
    const e = $('addEnglish').value.trim();

    if (!h || !p || !e) {
      alert('Please fill in all fields');
      return;
    }

    customCards.push({ h, p, e });
    saveCustomCards();
    render();
  };

  m.querySelectorAll('.del').forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.dataset.idx);
      customCards.splice(idx, 1);
      saveCustomCards();
      render();
    };
  });

  const studyBtn = $('studyCustom');
  if (studyBtn) {
    studyBtn.onclick = () => {
      currentLevel = 'custom';
      queue = shuffle([...customCards]);
      sessionStats = { correct: 0, again: 0 };
      flipped = false;
      view = 'study';
      render();
    };
  }
}

// ---------- Navigation ----------
$('tab-levels').onclick = () => { view = 'levels'; render(); };
$('tab-study').onclick = () => {
  if (currentLevel && (HSK[currentLevel] || currentLevel === 'custom')) {
    view = 'levelDetail';
  } else {
    view = 'levels';
  }
  render();
};
$('tab-add').onclick = () => { view = 'add'; render(); };
$('tab-stats').onclick = () => { view = 'stats'; render(); };
$('themeToggle').onclick = toggleTheme;

// ---------- Init ----------
loadProgress();
loadCustomCards();
loadSRS();
loadTheme();
render();

// Preload voices
if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}
</script>
</body></html>
